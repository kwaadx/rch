services:
  rch:
    ## Platform images:
    ##   amd64 (Intel/AMD):  ghcr.io/kwaadx/rch:latest
    ##   arm64 (Jetson/RPi): ghcr.io/kwaadx/rch:latest-arm64
    image: ghcr.io/kwaadx/rch:latest
    ports:
      - "${RCH_WEB_PORT:-19580}:19580"
    volumes:
      - rch_data:/var/lib/rch
    environment:
      ## ─── Authentication ───────────────────────────────────────────────
      ## JWT secret (auto-generated and persisted in volume if not set)
      # RCH_JWT_SECRET_KEY: "your-secret-key"
      # RCH_JWT_TOKEN_EXPIRE_MINUTES: "30"

      ## Session
      # RCH_SESSION_MAX_CONCURRENT: "5"
      # RCH_SESSION_REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ## Cookie
      RCH_COOKIE_SECURE: "false"        # true when behind HTTPS
      RCH_COOKIE_SAMESITE: "Lax"
      # RCH_COOKIE_DOMAIN: ""

      ## ─── Networking ───────────────────────────────────────────────────
      ## CORS (defaults to http://localhost:19580; set to your domain when behind reverse proxy)
      # RCH_CORS_ORIGINS: "https://dashboard.example.com"

      ## Trusted reverse proxy IPs (CIDR notation, comma-separated)
      # RCH_TRUSTED_PROXIES: "172.16.0.0/12"

      ## ─── Database & Redis ─────────────────────────────────────────────
      ## PostgreSQL password (auto-generated and persisted if not set)
      # RCH_POSTGRES_PASSWORD: "your-secure-password"

      ## External database (overrides built-in PostgreSQL)
      # RCH_DATABASE_URL: "postgresql://user:pass@host:5432/rch"

      ## External Redis (overrides built-in Redis)
      # RCH_REDIS_URL: "redis://:password@host:6379/0"

      ## ─── Log Retention ────────────────────────────────────────────────
      # RCH_AUDIT_RETENTION_DAYS: "90"
      # RCH_INTEGRATION_LOG_RETENTION_DAYS: "7"
      # RCH_SYSTEM_LOG_RETENTION_DAYS: "30"

      ## ─── Push Notifications ───────────────────────────────────────────
      ## Generate keys: npx web-push generate-vapid-keys
      # RCH_VAPID_PUBLIC_KEY: ""
      # RCH_VAPID_PRIVATE_KEY: ""
      # RCH_VAPID_CONTACT_EMAIL: "mailto:admin@example.com"

      ## ─── API & MCP ────────────────────────────────────────────────────
      ## Internal API key (service-to-service auth)
      # RCH_INTERNAL_API_KEY: ""

      ## Swagger/OpenAPI docs
      # RCH_API_ENABLE_DOCS: "true"

      ## MCP Server (AI assistant bridge)
      ## Exposes Streamable HTTP MCP endpoint at /mcp. Generate an API key
      ## in the RCH UI (sidebar → API Keys → Create Key), then paste the
      ## URL + key into your AI tool's MCP config. Set to "false" to disable.
      RCH_MCP_ENABLE: "true"
      # RCH_MCP_PUBLIC_URL: "https://your-domain.com/mcp"

      ## ─── Security ─────────────────────────────────────────────────────
      ## Brute-force protection
      # RCH_LOCKOUT_MAX_ATTEMPTS: "5"
      # RCH_LOCKOUT_DURATION_MINUTES: "15"
      # RCH_LOCKOUT_ENABLED: "true"

      ## Password policy
      # RCH_PASSWORD_MIN_LENGTH: "8"

      ## ─── Performance Tuning ───────────────────────────────────────────
      ## API workers (default 1; increase for multi-core, requires RCH_BINDING_STATE_BACKEND=redis)
      # RCH_API_WORKERS: "1"

      ## Log level override (DEBUG, INFO, WARNING, ERROR)
      # RCH_LOG_LEVEL: "WARNING"

      ## Skip Getting Started seed on first run
      # RCH_SKIP_SEED: "true"

      ## Connector demand-aware lifecycle
      # RCH_REST_BACKGROUND_MIN_POLL_INTERVAL_MS: "1000"
      # RCH_MQTT_BACKGROUND_ENABLED: "on"       # "off" = defer until UI subscriber
      # RCH_WS_BACKGROUND_ENABLED: "on"
      # RCH_ROS2_BACKGROUND_ENABLED: "on"

      ## Database pool
      # RCH_DB_POOL_MIN: "5"
      # RCH_DB_POOL_MAX: "20"

      ## ─── Observability ────────────────────────────────────────────────
      # RCH_SENTRY_DSN: ""
      # RCH_METRICS_ENABLED: "true"

      ## ─── Demo Mode ────────────────────────────────────────────────────
      ## Read-only mode (blocks all mutations via API)
      # RCH_DEMO_MODE: "true"
    restart: unless-stopped

volumes:
  rch_data:
