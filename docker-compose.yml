services:
  rch:
    image: ghcr.io/kwaadx/rch:latest
    ports:
      - "${RCH_WEB_PORT:-19580}:19580"
    volumes:
      - rch_data:/var/lib/rch
    environment:
      ## JWT (auto-generated and persisted if not set)
      # JWT_SECRET_KEY: "your-secret-key"
      # JWT_TOKEN_EXPIRE_MINUTES: "30"

      ## Session
      # SESSION_MAX_CONCURRENT: "5"
      # SESSION_REFRESH_TOKEN_EXPIRE_DAYS: "30"

      ## Cookie
      COOKIE_SECURE: "false"        # true when behind HTTPS
      COOKIE_SAMESITE: "Lax"
      # COOKIE_DOMAIN: ""

      ## CORS (defaults to http://localhost:19580; set to your domain when behind reverse proxy)
      # CORS_ORIGINS: "https://dashboard.example.com"

      ## Log retention (auto-cleanup old entries)
      # AUDIT_RETENTION_DAYS: "90"
      # INTEGRATION_LOG_RETENTION_DAYS: "7"
      # SYSTEM_LOG_RETENTION_DAYS: "30"

      ## Push Notifications (npx web-push generate-vapid-keys)
      # VAPID_PUBLIC_KEY: ""
      # VAPID_PRIVATE_KEY: ""
      # VAPID_CONTACT_EMAIL: "mailto:admin@example.com"

      ## Internal API Key (service-to-service auth)
      # INTERNAL_API_KEY: ""

      ## Docs
      # API_ENABLE_DOCS: "true"

      ## MCP Server (AI assistant bridge)
      # Exposes Streamable HTTP MCP endpoint at /mcp. Generate an API key
      # in the RCH UI (sidebar → API Keys → Create Key), then paste the
      # URL + key into your AI tool's MCP config. Set to "false" to disable.
      MCP_ENABLE: "true"
    restart: unless-stopped

volumes:
  rch_data:
